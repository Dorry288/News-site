<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DorryHabariSphere | News Details</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet" href="style.css">


</head>


<body>


<!-- HEADER -->

<header class="site-header">

<div class="container">

<a href="index.html" class="site-logo">

Dorry<span>HabariSphere</span>

</a>


<p class="site-tagline">

Habari za Kweli, Kwa Wakati Sahihi

</p>


</div>

</header>




<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-custom">


<div class="container">


<button class="navbar-toggler bg-light"
data-bs-toggle="collapse"
data-bs-target="#mainNavbar">


<span class="navbar-toggler-icon"></span>


</button>



<div class="collapse navbar-collapse" id="mainNavbar">


<ul class="navbar-nav mx-auto">


<li class="nav-item">
<a class="nav-link" href="index.html">
Home
</a>
</li>


<li class="nav-item">
<a class="nav-link" href="about.html">
About Us
</a>
</li>


<li class="nav-item">
<a class="nav-link" href="contact.html">
Contact Us
</a>
</li>


</ul>


</div>


</div>


</nav>





<!-- ARTICLE -->


<main class="py-5">


<div class="container">


<div class="row">


<div class="col-lg-8">


<article id="article-content"
class="bg-white p-4 rounded shadow-sm">

</article>


</div>





<div class="col-lg-4">


<div class="sidebar-widget">


<h4 class="widget-title">

Trending Stories

</h4>


<div id="trending-container">

</div>


</div>


</div>


</div>


</div>


</main>






<!-- FOOTER -->


<footer class="site-footer py-4">


<div class="container text-center">


<div class="footer-logo">

Dorry<span>HabariSphere</span>

</div>


<p>

© 2026 DorryHabariSphere. All Rights Reserved.

</p>


</div>


</footer>






<script src="newsDatabase.js"></script>

<script>


document.addEventListener("DOMContentLoaded",()=>{

const article = document.getElementById("article-content");
const trending = document.getElementById("trending-container");

const params = new URLSearchParams(window.location.search);
const id = Number(params.get("id"));

const news = newsDatabase.find(item => item.id === id);


if(news){

article.innerHTML = `

<img src="${news.image}" class="img-fluid rounded mb-4">


<span class="category-badge">
${news.category}
</span>


<h1 class="mt-3">
${news.title}
</h1>


<div class="news-meta">
📅 ${news.date} |
📍 ${news.location} |
👤 ${news.author}
</div>


<hr>


<p class="news-preview">
${news.summary}
</p>


<div class="article-body">
${news.content.split("\n\n").map(p=>`<p>${p}</p>`).join("")}
</div>


<hr>


<p>
<strong>Source:</strong> ${news.source}
</p>

`;

}


// Trending stories

newsDatabase.slice(0,5).forEach(item=>{

trending.innerHTML += `

<a href="news-details.html?id=${item.id}" 
class="sidebar-list-item">

<div class="sidebar-item-title">
${item.title}
</div>

<div class="sidebar-item-meta">
${item.category}
</div>

</a>

`;

});


});



</script>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



</body>

</html>
