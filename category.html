<script src="newsDatabase.js"></script>


<script>


const params = new URLSearchParams(window.location.search);

const category = params.get("cat");


document.getElementById("category-title").innerHTML =
category + " News";



const container = document.getElementById("category-news");



const filteredNews = newsDatabase.filter(news =>

news.category === category

);



if(filteredNews.length > 0){


filteredNews.forEach(news=>{


container.innerHTML += `


<div class="col-md-6">


<div class="card news-card shadow-sm h-100">


<div class="card-img-container">


<span class="category-badge">

${news.category}

</span>


<img src="${news.image}">


</div>


<div class="card-body">


<h3 class="card-news-title">

${news.title}

</h3>


<p class="news-preview">

${news.summary}

</p>


<a href="news-details.html?id=${news.id}"
class="btn btn-readmore">

Read More

</a>


</div>


</div>


</div>


`;



});


}else{


container.innerHTML = `

<h3>
Hakuna habari kwenye category hii bado.
</h3>

`;

}


</script>
